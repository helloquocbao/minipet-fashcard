<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speech Bubble</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    ::-webkit-scrollbar { display: none; }

    /* Fixed-size transparent window. Flexbox centers the bubble horizontally
       (justify-content) — bulletproof in every webview — and anchors it to the
       bottom (align-items:flex-end) so it grows UPWARD and never clips. */
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      scrollbar-width: none;
      position: relative;
    }

    #bubble {
      position: absolute;
      bottom: 12px; /* Anchor near bottom to leave space for tail */
      left: 50%;
      transform: translateX(-50%) translateY(10px) scale(0.95);
      width: max-content;
      height: max-content;
      background: #ffffff;
      border-radius: 16px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 12.5px;
      font-weight: 500;
      line-height: 1.5;
      color: #2d3142;
      padding: 10px 16px;
      text-align: center;
      word-break: normal;
      overflow-wrap: normal;
      white-space: pre-wrap; /* Preserve formatting and wrap lines naturally */
      box-shadow:
        0 8px 24px rgba(0,0,0,0.12),
        0 2px 6px rgba(0,0,0,0.06);
      border: 1px solid rgba(108,99,255,0.10);
      opacity: 0;
      transition:
        opacity 0.32s cubic-bezier(0.16,1,0.3,1),
        transform 0.32s cubic-bezier(0.34,1.56,0.64,1);
      transform-origin: bottom center;
    }

    #bubble.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
    }

    /* Tail pointing down toward pet */
    #bubble::after {
      content: '';
      position: absolute;
      bottom: -7px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 7px solid #ffffff;
    }
  </style>
</head>
<body>
  <div id="bubble">...</div>
  <script type="module" src="./speech.ts"></script>
</body>
</html>
