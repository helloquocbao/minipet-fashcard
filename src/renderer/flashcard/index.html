<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    ::-webkit-scrollbar { display: none; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      scrollbar-width: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    /* ── Wrapper: animates in/out ── */
    #fc-wrapper {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transform: translateY(14px) scale(0.94);
      transition:
        opacity 0.38s cubic-bezier(0.16,1,0.3,1),
        transform 0.38s cubic-bezier(0.34,1.56,0.64,1);
    }

    #fc-wrapper.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* ── 3D flip container ── */
    #fc-container {
      width:  var(--fc-w, 170px);
      height: var(--fc-h, 215px);
      perspective: 900px;
      flex-shrink: 0;
      position: relative;
    }

    .fc-card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
    }

    .fc-card.flipped { transform: rotateY(180deg); }

    .fc-face {
      position: absolute;
      inset: 0;
      min-height: 195px;            /* keeps the card a vertical (portrait) rectangle */
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 16px;
      padding: 16px 14px 42px;      /* extra bottom space reserves room for the buttons */
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* Front: word centered. Back: content flows from the top. */
    .fc-back {
      justify-content: flex-start;
      gap: 8px;
    }

    /* ── Front face ── */
    .fc-front {
      background: linear-gradient(145deg, #f5f3ff 0%, #ede9fe 100%);
      border: 1.5px solid rgba(108,99,255,0.2);
      box-shadow:
        0 8px 24px rgba(108,99,255,0.15),
        0 2px 8px rgba(0,0,0,0.06);
      align-items: center;
      text-align: center;
      justify-content: flex-start;   /* sit a bit higher than dead-center */
      padding-top: 34px;
    }

    .fc-word {
      font-size: 21px;
      font-weight: 800;
      background: linear-gradient(135deg, #818cf8, #e879f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
      margin-bottom: 9px;
      letter-spacing: -0.3px;
      overflow-wrap: break-word;
    }

    .fc-meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .fc-type {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      background: rgba(13,148,136,0.16);
      color: #0f766e;
      padding: 2px 8px;
      border-radius: 5px;
    }

    .fc-ipa {
      font-size: 11px;
      color: #57607a;
      font-weight: 500;
      font-style: italic;
    }

    /* ── Back face ── */
    .fc-back {
      background: linear-gradient(145deg, #ffffff 0%, #fafafa 100%);
      border: 1.5px solid rgba(108,99,255,0.15);
      box-shadow:
        0 8px 24px rgba(0,0,0,0.08),
        0 2px 8px rgba(0,0,0,0.04);
      transform: rotateY(180deg);
    }

    .fc-word-mini {
      font-size: 9px;
      font-weight: 700;
      color: #ec4899;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .fc-meaning {
      font-size: 13px;
      font-weight: 700;
      color: #1e293b;
      line-height: 1.38;
      overflow-wrap: break-word;
    }

    .fc-example {
      font-size: 10.5px;
      color: #475569;
      line-height: 1.45;
      padding-left: 9px;
      border-left: 2px solid #fbbf24;
      font-style: italic;
      overflow-wrap: break-word;
    }

    /* ── Action buttons (anchored bottom-center INSIDE the card) ── */
    #action-buttons {
      position: absolute;
      bottom: 12px;
      left: 0;
      right: 0;
      display: flex;
      gap: 6px;
      justify-content: center;
      z-index: 10;
    }

    #action-buttons button {
      padding: 4px 13px;
      border: none;
      border-radius: 13px;
      font-size: 10px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.18s ease;
      letter-spacing: 0.2px;
    }

    #action-buttons button:hover  { filter: brightness(1.07); transform: translateY(-1px); }
    #action-buttons button:active { transform: scale(0.96); }

    #action-buttons .btn-primary {
      background: linear-gradient(135deg, #6d28d9, #4f46e5);
      color: #fff;
      box-shadow: 0 3px 10px rgba(79,70,229,0.45);
    }

    #action-buttons .btn-secondary {
      background: #ffffff;
      color: #5b21b6;
      border: 1.5px solid #c4b5fd;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    #action-buttons .btn-secondary:hover {
      background: #f5f3ff;
    }
  </style>
</head>
<body>
  <div id="fc-wrapper">
    <div id="fc-container">
      <div class="fc-card" id="fc-card">
        <div class="fc-face fc-front">
          <div class="fc-word" id="fc-word-front">Serendipity</div>
          <div class="fc-meta">
            <span class="fc-type" id="fc-type-front">noun</span>
            <span class="fc-ipa"  id="fc-ipa-front">/ˌserənˈdipədē/</span>
          </div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-word-mini" id="fc-word-back">Serendipity</div>
          <div class="fc-meaning"  id="fc-meaning-back">Sự tình cờ may mắn</div>
          <div class="fc-example"  id="fc-example-back">We found the charming little restaurant by pure serendipity.</div>
        </div>
      </div>
      <div id="action-buttons"></div>
    </div>
  </div>

  <script type="module" src="./flashcard.ts"></script>
</body>
</html>
