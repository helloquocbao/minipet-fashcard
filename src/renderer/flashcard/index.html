<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    ::-webkit-scrollbar { display: none; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      scrollbar-width: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px;
      font-family: 'Outfit', system-ui, sans-serif;
    }

    /* ── Wrapper: animates in/out ── */
    #fc-wrapper {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transform: translateY(14px) scale(0.94);
      transition:
        opacity 0.38s cubic-bezier(0.16,1,0.3,1),
        transform 0.38s cubic-bezier(0.34,1.56,0.64,1);
    }

    #fc-wrapper.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* ── 3D flip container ── */
    #fc-container {
      width:  var(--fc-w, 220px);
      height: var(--fc-h, 130px);
      perspective: 800px;
      flex-shrink: 0;
      transition: width 0.25s ease, height 0.25s ease;
    }

    .fc-card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
    }

    .fc-card.flipped { transform: rotateY(180deg); }

    .fc-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* ── Front face ── */
    .fc-front {
      background: linear-gradient(145deg, #f5f3ff 0%, #ede9fe 100%);
      border: 1.5px solid rgba(108,99,255,0.2);
      box-shadow:
        0 8px 24px rgba(108,99,255,0.15),
        0 2px 8px rgba(0,0,0,0.06);
    }

    .fc-word {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, #6c63ff, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .fc-meta {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .fc-type {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      background: rgba(108,99,255,0.18);
      color: #6c63ff;
      padding: 2px 7px;
      border-radius: 6px;
    }

    .fc-ipa {
      font-size: 11px;
      color: #6b7280;
      font-weight: 400;
      font-style: italic;
    }

    /* ── Back face ── */
    .fc-back {
      background: linear-gradient(145deg, #ffffff 0%, #fafafa 100%);
      border: 1.5px solid rgba(108,99,255,0.15);
      box-shadow:
        0 8px 24px rgba(0,0,0,0.08),
        0 2px 8px rgba(0,0,0,0.04);
      transform: rotateY(180deg);
    }

    .fc-word-mini {
      font-size: 9px;
      font-weight: 700;
      color: #8b5cf6;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 5px;
    }

    .fc-meaning {
      font-size: 13px;
      font-weight: 700;
      color: #1e293b;
      line-height: 1.35;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .fc-example {
      font-size: 10.5px;
      color: #64748b;
      line-height: 1.45;
      padding-left: 8px;
      border-left: 2.5px solid #c4b5fd;
      font-style: italic;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Action buttons ── */
    #action-buttons {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    #action-buttons button {
      padding: 6px 18px;
      border: none;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.18s ease;
      letter-spacing: 0.2px;
    }

    #action-buttons button:hover  { filter: brightness(1.07); transform: translateY(-1px); }
    #action-buttons button:active { transform: scale(0.96); }

    #action-buttons .btn-primary {
      background: linear-gradient(135deg, #6c63ff, #8b5cf6);
      color: #fff;
      box-shadow: 0 4px 12px rgba(108,99,255,0.38);
    }

    #action-buttons .btn-secondary {
      background: rgba(0,0,0,0.07);
      color: #4f5d75;
    }

    #action-buttons .btn-secondary:hover {
      background: rgba(0,0,0,0.11);
    }
  </style>
</head>
<body>
  <div id="fc-wrapper">
    <div id="fc-container">
      <div class="fc-card" id="fc-card">
        <div class="fc-face fc-front">
          <div class="fc-word" id="fc-word-front">Serendipity</div>
          <div class="fc-meta">
            <span class="fc-type" id="fc-type-front">noun</span>
            <span class="fc-ipa"  id="fc-ipa-front">/ˌserənˈdipədē/</span>
          </div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-word-mini" id="fc-word-back">Serendipity</div>
          <div class="fc-meaning"  id="fc-meaning-back">Sự tình cờ may mắn</div>
          <div class="fc-example"  id="fc-example-back">We found the charming little restaurant by pure serendipity.</div>
        </div>
      </div>
    </div>

    <div id="action-buttons"></div>
  </div>

  <script type="module" src="./flashcard.ts"></script>
</body>
</html>
